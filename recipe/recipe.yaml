context:
  version: "5.0.0"
  lua_version: "5.4.8"
  pdcursesmod_version: "4.5.1"

package:
  name: nethack
  version: ${{ version }}

source:
  - url: https://github.com/NetHack/NetHack/archive/refs/tags/NetHack-${{ version }}_Released.tar.gz
    sha256: 5638ab7069f143ac4f8197677aee4d43ee3dd1a90a780e596e6ed4f526302703
    patches:
      - patches/0001-compiler.500-respect-env-CFLAGS.patch
      - patches/0002-Makefile.src-link-against-conda-lua.patch
      - patches/0003-hints-silence-git-probes.patch
      - patches/0004-Makefile.nmake-conda-forge-windows.patch
  - if: win
    then:
      url: https://github.com/Bill-Gray/PDCursesMod/archive/refs/tags/v${{ pdcursesmod_version }}.zip
      sha256: 24a277fc8f5a04bddb9a02d27b100f58dcc3077589db1256f7b9679a1ef5b616
      target_directory: lib/pdcursesmod

build:
  number: 4
  script:
    env:
      LUA_VERSION: ${{ lua_version }}

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - if: not win
      then:
        - make
        - groff
  host:
    - lua ==${{ lua_version }}
    - if: not win
      then:
        - ncurses

tests:
  - script:
      - if: not win
        then:
          - test -f $PREFIX/bin/nethack
          - test -f $PREFIX/share/nethack/nethack
          - test -f $PREFIX/share/nethack/recover
          - test -f $PREFIX/share/nethack/nhdat
          - test -f $PREFIX/share/nethack/sysconf
          - test -f $PREFIX/share/nethack/license
          - nethack --version
      - if: win
        then:
          - if not exist %LIBRARY_BIN%\nethack.exe exit 1
          - if not exist %LIBRARY_PREFIX%\share\nethack\nhdat500 exit 1
          - if not exist %LIBRARY_PREFIX%\share\nethack\sysconf.template exit 1
          - if not exist %LIBRARY_PREFIX%\share\nethack\license exit 1
          # Skip `nethack.exe --version`: NetHack's Windows startup
          # calls SHGetKnownFolderPath(FOLDERID_Profile) before the
          # early-args path that handles --version, and that call
          # errors out under the Azure pipelines service account.

about:
  homepage: https://www.nethack.org/
  repository: https://github.com/NetHack/NetHack
  documentation: https://nethackwiki.com/
  summary: A classic terminal-based roguelike dungeon exploration game
  description: |
    NetHack is a single player dungeon exploration game that runs on a
    wide variety of computer systems, with a variety of graphical and
    text interfaces all using the same game engine. Unlike many other
    Dungeons & Dragons-inspired games, the emphasis in NetHack is on
    discovering the detail of the dungeon and not simply killing
    everything in sight.
  license: NGPL
  license_file: dat/license

extra:
  recipe-maintainers:
    - tdejager
